<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Shop</h1>
    </header>
    <main>
        <section class="shop-items">
            <div class="item">
                <img src="1180w-600h_mickey-mouse_1.jpg" alt="Item 1">
                <h2>Item 1</h2>
                <p>$10.00</p>
                <button>Select Item</button>
                <button class="edit-item" data-index="0">Edit</button>
                <button class="delete-item" data-index="0">Delete</button>
            </div>
            <div class="item">
                <img src="1559.webp" alt="Item 2">
                <h2>Item 2</h2>
                <p>$15.00</p>
                <button>Select Item</button>
                <button class="edit-item" data-index="1">Edit</button>
                <button class="delete-item" data-index="1">Delete</button>
            </div>
            <div class="item">
                <img src="download.jpg" alt="Item 3">
                <h2>Item 3</h2>
                <p>$20.00</p>
                <button>Select Item</button>
                <button class="edit-item" data-index="2">Edit</button>
                <button class="delete-item" data-index="2">Delete</button>
            </div>
        </section>
    </main>
    <footer>
        <section class="payment-section">
            <h2>Finalize Your Payment</h2>
            <form action="/submit-payment" method="POST">
                <label for="customer-name">Customer Name:</label>
                <input type="text" id="customer-name" name="customer-name" required>

                <label for="card-number">Card Number:</label>
                <input type="text" id="card-number" name="card-number" required>

                <label for="expiry-date">Expiry Date:</label>
                <input type="month" id="expiry-date" name="expiry-date" required>

                <label for="cvv">CVV:</label>
                <input type="text" id="cvv" name="cvv" required>

                <label for="cardholder-name">Cardholder Name:</label>
                <input type="text" id="cardholder-name" name="cardholder-name" required>

                <button type="submit">Pay Now</button>
            </form>
        </section>
    </footer>
</body>
</html>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const itemsContainer = document.querySelector('.shop-items');

        // CRUD Operations
        const items = [
            { name: 'Item 1', price: 10, image: '1180w-600h_mickey-mouse_1.jpg' },
            { name: 'Item 2', price: 15, image: '1559.webp' },
            { name: 'Item 3', price: 20, image: 'download.jpg' }
        ];

        function renderItems() {
            itemsContainer.innerHTML = '';
            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.classList.add('item');
                itemDiv.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <h2>${item.name}</h2>
                    <p>$${item.price.toFixed(2)}</p>
                    <button class="select-item">Select Item</button>
                    <button class="edit-item" data-index="${index}">Edit</button>
                    <button class="delete-item" data-index="${index}">Delete</button>
                `;
                itemsContainer.appendChild(itemDiv);
            });
        }

        function addItem(name, price, image) {
            items.push({ name, price, image });
            renderItems();
        }

        function editItem(index, name, price, image) {
            items[index] = { name, price, image };
            renderItems();
        }

        function deleteItem(index) {
            items.splice(index, 1);
            renderItems();
        }

        itemsContainer.addEventListener('click', (e) => {
            if (e.target.classList.contains('delete-item')) {
                const index = e.target.dataset.index;
                deleteItem(index);
            } else if (e.target.classList.contains('edit-item')) {
                const index = e.target.dataset.index;
                const item = items[index];
                const newName = prompt('Enter new name:', item.name);
                const newPrice = parseFloat(prompt('Enter new price:', item.price));
                const newImage = prompt('Enter new image URL:', item.image);
                if (newName && !isNaN(newPrice) && newImage) {
                    editItem(index, newName, newPrice, newImage);
                }
            }
        });

        document.getElementById('add-item-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('new-item-name').value;
            const price = parseFloat(document.getElementById('new-item-price').value);
            const image = document.getElementById('new-item-image').value;
            if (name && !isNaN(price) && image) {
                addItem(name, price, image);
                e.target.reset();
            }
        });

        renderItems();
    });
</script>

<section class="add-item-section">
    <h2>Add New Item</h2>
    <form id="add-item-form">
        <label for="new-item-name">Item Name:</label>
        <input type="text" id="new-item-name" required>

        <label for="new-item-price">Item Price:</label>
        <input type="number" id="new-item-price" required>

        <label for="new-item-image">Item Image URL:</label>
        <input type="text" id="new-item-image" required>

        <button type="submit">Add Item</button>
    </form>
</section>
